<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giriş</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000;
            font-family: sans-serif;
            /* Mobilde kaydırma (pull-to-refresh) hareketini engeller */
            overscroll-behavior: none; 
        }
        
        /* Tıklanacak yazı alanı */
        #yazi-alani {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 999; cursor: pointer; color: #ffffff; text-align: center;
            padding: 20px; box-sizing: border-box;
        }

        /* Mobilde yazının taşmaması için font boyutunu dinamik yapıyoruz (vw = viewport width) */
        #yazi-alani h1 {
            font-size: 6vw;
            max-width: 90%;
        }

        /* Video alanı - Hem bilgisayarda hem mobilde tam ekran kaplar */
        video {
            position: fixed; 
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto; 
            z-index: 10; 
            /* Videoyu tam merkeze oturtarak mobilde dikey açılsa bile ortayı göstermesini sağlar */
            transform: translate(-50%, -50%);
            object-fit: cover; /* Videoyu boşluk bırakmadan ekrana yayar */
            display: none;
        }

        /* Sadece dikey ekranlı telefonlar için ekstra font ayarı */
        @media (max-width: 480px) {
            #yazi-alani h1 {
                font-size: 24px; /* Mobilde çok büyük durmasın */
            }
        }
    </style>
</head>
<body>

    <div id="yazi-alani" onclick="sakaBaslat()">
        <h1>Devam etmek için buraya tıkla...</h1>
    </div>

    <video id="rick-video" loop playsinline webkit-playsinline>
        <source src="{{ url_for('static', filename='rick.mp4') }}" type="video/mp4">
    </video>

    <script>
        function sakaBaslat() {
            document.getElementById('yazi-alani').style.display = 'none';
            
            var video = document.getElementById("rick-video");
            video.style.display = 'block';
            video.muted = false; 
            video.volume = 1.0;  
            video.play().catch(function(error) {
                console.log("Mobil otomatik oynatma hatası:", error);
            });        
        }
    </script>

</body>
</html>
